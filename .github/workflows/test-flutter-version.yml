name: Test Flutter Android Compilation

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Version du SDK Flutter (ex: 3.24.0, stable, beta)'
        required: true
        default: 'stable'
        type: string

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Recommandé pour les versions récentes de Flutter/Android

      - name: Configuration de Flutter (${{ inputs.flutter_version }})
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          cache: true # Accélère les exécutions futures

      - name: Trouver et compiler les projets Flutter
        run: |
          echo "Recherche de projets Flutter dans : code"

          # Trouve tous les dossiers contenant un pubspec.yaml
          PROJECTS=$(find code -name "pubspec.yaml" -exec dirname {} \;)

          if [ -z "$PROJECTS" ]; then
            echo "⚠️ Aucun projet Flutter trouvé dans code"
            exit 0
          fi

          # Itération sur chaque projet trouvé
          for DIR in $PROJECTS; do
            echo "==================================================="
            echo "🚀 Vérification du projet : $DIR"
            echo "==================================================="

            cd "$DIR"

            # Vérification de la présence du dossier 'android'
            if [ ! -d "android" ]; then
              echo "⏭️ Le dossier 'android' est introuvable. Ce projet est soit un package Dart pur, soit il ne supporte pas Android. Ignoré."
              cd "$GITHUB_WORKSPACE"
              continue
            fi

            # Génération des stubs pour les fichiers sensibles manquants (gitignorés)
            if [ ! -f "lib/firebase_options.dart" ] && grep -q "firebase_options" lib/main.dart 2>/dev/null; then
              echo "⚠️ firebase_options.dart manquant - création d'un stub pour CI..."
              cat > lib/firebase_options.dart << 'FIREBASE_STUB'
          // Stub auto-généré pour CI - ne pas utiliser en production
          // ignore_for_file: lines_longer_than_80_chars
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;
          
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                default:
                  throw UnsupportedError('Plateforme non supportée.');
              }
            }
          
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'stub-api-key',
              appId: '1:000000000000:android:0000000000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'stub-project',
              storageBucket: 'stub-project.appspot.com',
            );
          
            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'stub-api-key',
              appId: '1:000000000000:ios:0000000000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'stub-project',
              storageBucket: 'stub-project.appspot.com',
              iosBundleId: 'com.example.stub',
            );
          }
          FIREBASE_STUB
            fi

            if [ ! -f "android/app/google-services.json" ] && [ -f "android/app/build.gradle" ]; then
              APP_PKG=$(grep -oP 'applicationId\s*=\s*"\K[^"]+' android/app/build.gradle | head -1)
              if [ -n "$APP_PKG" ]; then
                echo "⚠️ google-services.json manquant - création d'un stub pour CI (package: $APP_PKG)..."
                cat > android/app/google-services.json << GSERVICES_STUB
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "stub-project",
              "storage_bucket": "stub-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "$APP_PKG"
                  }
                },
                "oauth_client": [],
                "api_key": [{"current_key": "stub-api-key"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              }
            ],
            "configuration_version": "1"
          }
          GSERVICES_STUB
              fi
            fi

            # Récupération des dépendances
            echo "📦 Récupération des dépendances (pub get)..."
            flutter pub get

            # Compilation pour Android
            # On utilise --debug car c'est beaucoup plus rapide que --release et 
            # suffisant pour valider que le code compile.
            echo "⚙️ Compilation de l'APK Android..."
            flutter build apk --debug

            # Vérification du code de retour de la compilation
            if [ $? -ne 0 ]; then
              echo "❌ Échec de la compilation pour $DIR"
              exit 1
            fi

            echo "✅ Compilation réussie pour $DIR"

            # Retour à la racine du workspace pour la prochaine itération
            cd "$GITHUB_WORKSPACE"
          done